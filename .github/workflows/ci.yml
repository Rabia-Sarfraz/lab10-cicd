name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install
      - name: Run Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm test

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Security Scan
        run: echo "Security Scan Passed"

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Smoke Test
        run: echo "Smoke Test Passed"

  rollback:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - name: Rollback Deployment
        run: echo "Deployment Reverted"